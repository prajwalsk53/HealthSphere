name: Deploy to IONOS

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get install -y lftp sshpass

      - name: Deploy via SFTP
        env:
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SSHPASS: ${{ secrets.SFTP_PASSWORD }}
        run: |
          lftp -e "
            set sftp:connect-program 'sshpass -e ssh -o StrictHostKeyChecking=no';
            open sftp://$SFTP_USER@access-5020406432.webspace-host.com:22;
            mirror --reverse --delete --verbose \
              --exclude='^\.git' \
              --exclude='config/mail\.php' \
              --exclude='^logs/' \
              --exclude='^sql/' \
              --exclude='.*\.sql$' \
              ./ /HealthSphere/;
            quit
          "
